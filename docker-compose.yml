version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped
  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes: ["./dashboard:/app"]
    command: sh -c "npm install && npm run dev -- --host"
    ports: ["3000:3000"]
    depends_on: [api]
